<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="midia-all.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=key" />

</head>

<body>
    <main>
        <section id="login">
            <div id="imagen">


            </div>
            <div id="formulario">
                <h1 id="logotipo">Space Games</h1>

                <p>seja Bem vindo(a) faça login para acessar sua conta</p>

               
                <form action="" method="post">
                    <div class="campo">

                        <span class="material-symbols-outlined">
                            login
                        </span>
                        <input type="email" name="email" id="clogin" autocomplete="email" placeholder="sua email"
                            required>
                        <label for="clogin">login</label>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">
                            key
                        </span>

                        <input type="password" name="senha" id="csenha" placeholder="sua senha"
                            autocomplete="current-password" required minlength="8">
                        <label for="csenha">Senha</label>
                    </div>
                    <input type="submit" value="Entra">
                    <input type="button" value="Esqueci a senha ">

                </form>

            </div>
        </section>
    </main>
</body>

</html>
